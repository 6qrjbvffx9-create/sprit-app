<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpritApp</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
}

.container {
    padding: 15px;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    color: white;
    font-size: 16px;
}

.stat {
    font-size: 28px;
    font-weight: bold;
}

.small {
    color: #94a3b8;
}

/* Swipe */
.eintrag {
    position: relative;
    overflow: hidden;
}

.loeschen-btn {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    width: 80px;
    background: red;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
}
</style>
</head>
<body>
<header>🚗 SpritApp</header>
<div class="container">
<div class="card">
    <div class="small">Neue Fahrt</div>

    <input type="number" id="km" placeholder="Gefahrene km">
    <input type="number" id="liter" placeholder="Getankte Liter">
    <input type="number" id="preis" placeholder="Preis €/L">

    <button onclick="speichern()">Speichern</button>
</div>

<div class="card">
    <div class="small">Durchschnitt</div>
    <div id="avg" class="stat">0.0</div>
    <div class="small">L / 100 km</div>
</div>

<div class="card">
    <div class="small">Verlauf</div>
    <canvas id="chart"></canvas>
</div>

<div class="card">
    <div class="small">Fahrten</div>
    <div id="liste"></div>
</div>
</div>
<script>
let fahrten = JSON.parse(localStorage.getItem("fahrten")) || [];

const kmInput = document.getElementById("km");
const literInput = document.getElementById("liter");
const preisInput = document.getElementById("preis");

const avgText = document.getElementById("avg");
const ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Verbrauch (L/100km)",
            data: [],
            borderWidth: 2,
            tension: 0.3
        }]
    }
});

function updateUI() {
    if (fahrten.length === 0) return;

    let verbräuche = fahrten.map(f => f.verbrauch);

    let avg = verbräuche.reduce((a, b) => a + b, 0) / verbräuche.length;

    avgText.innerText = avg.toFixed(1);

    chart.data.labels = fahrten.map((_, i) => "Fahrt " + (i + 1));
    chart.data.datasets[0].data = verbräuche;
    chart.update();
}

function speichern() {
    let km = parseFloat(kmInput.value);
    let liter = parseFloat(literInput.value);
    let preis = parseFloat(preisInput.value);

    if (!km || !liter) return;

    let verbrauch = (liter / km) * 100;

    fahrten.push({
        km,
        liter,
        preis,
        verbrauch
    });

    localStorage.setItem("fahrten", JSON.stringify(fahrten));

    kmInput.value = "";
    literInput.value = "";
    preisInput.value = "";

    updateUI();
}

updateUI();
</script>
</body>
</html>
:::
