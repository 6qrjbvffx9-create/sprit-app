<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Spritverbrauch Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        header {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 15px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 15px;
            margin-top: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        canvas {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<header>🚗 Spritverbrauch Tracker</header>

<div class="container">

    <div class="card">
        <input type="number" id="km" placeholder="Gefahrene km">
        <input type="number" id="liter" placeholder="Getankte Liter">
        <input type="number" id="preis" placeholder="Preis €/L">

        <button onclick="speichern()">Speichern</button>
    </div>

    <div class="card">
        <h3>Verbrauchsverlauf</h3>
        <canvas id="chart"></canvas>
    </div>

</div>

<script>
let fahrten = JSON.parse(localStorage.getItem("fahrten")) || [];
let chart;

anzeigen();

function speichern() {
    let km = parseFloat(document.getElementById("km").value);
    let liter = parseFloat(document.getElementById("liter").value);
    let preis = parseFloat(document.getElementById("preis").value);

    if (!km || !liter || !preis) {
        alert("Bitte alle Felder ausfüllen!");
        return;
    }

    let verbrauch = (liter / km) * 100;

    fahrten.push({ verbrauch });

    localStorage.setItem("fahrten", JSON.stringify(fahrten));

    anzeigen();
}

function anzeigen() {
    let labels = fahrten.map((_, i) => "Fahrt " + (i + 1));
    let daten = fahrten.map(f => f.verbrauch);

    if (chart) chart.destroy();

    let ctx = document.getElementById("chart").getContext("2d");

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Verbrauch (L/100km)",
                data: daten,
                borderWidth: 2,
                tension: 0.3
            }]
        }
    });
}

// Service Worker registrieren
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
