<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpritApp</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
}

.container {
    padding: 15px;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
}

.save-btn {
    background: linear-gradient(90deg,#3b82f6,#06b6d4);
    color: white;
}

.reset-btn {
    background: #ef4444;
    color: white;
}
</style>
</head>

<body>

<header>🚗 SpritApp</header>

<div class="container">

<div class="card">
<h3>Neue Fahrt</h3>

<input id="km" placeholder="Gefahrene km">
<input id="liter" placeholder="Getankte Liter">
<input id="preis" placeholder="Preis €/L">

<button class="save-btn" onclick="speichern()">Speichern</button>
<button class="reset-btn" onclick="resetData()">Alles löschen</button>
</div>

<div class="card">
<h3>Durchschnitt</h3>
<h1 id="avg">0.0</h1>
<p>L / 100 km</p>
<p id="kosten"></p>
</div>

<div class="card">
<h3>Verlauf</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>
let fahrten = JSON.parse(localStorage.getItem("fahrten")) || [];

const kmInput = document.getElementById("km");
const literInput = document.getElementById("liter");
const preisInput = document.getElementById("preis");
const avgText = document.getElementById("avg");
const kostenText = document.getElementById("kosten");

const ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Verbrauch (L/100km)",
            data: [],
            borderWidth: 2,
            tension: 0.3
        }]
    }
});

function updateUI() {
    if (fahrten.length === 0) return;

    let verbräuche = fahrten.map(f => f.verbrauch);

    let avg = verbräuche.reduce((a, b) => a + b, 0) / verbräuche.length;
    avgText.innerText = avg.toFixed(1);

    chart.data.labels = fahrten.map((_, i) => "Fahrt " + (i + 1));
    chart.data.datasets[0].data = verbräuche;
    chart.update();

    let letzte = fahrten[fahrten.length - 1];

    if (letzte.preis) {
        let kosten = letzte.liter * letzte.preis;
        kostenText.innerText = "Kosten: " + kosten.toFixed(2) + " €";
    }
}

function speichern() {
    let km = parseFloat(kmInput.value);
    let liter = parseFloat(literInput.value);
    let preis = parseFloat(preisInput.value);

    if (!km || !liter) return;

    let verbrauch = (liter / km) * 100;

    fahrten.push({
        km,
        liter,
        preis,
        verbrauch
    });

    localStorage.setItem("fahrten", JSON.stringify(fahrten));

    kmInput.value = "";
    literInput.value = "";
    preisInput.value = "";

    updateUI();
}

function resetData() {
    fahrten = [];
    localStorage.removeItem("fahrten");
    location.reload();
}

updateUI();
</script>

</body>
</html>
