<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SpritApp</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
}

.container {
    padding: 15px;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    color: white;
    font-size: 16px;
}

.stat {
    font-size: 28px;
    font-weight: bold;
}

.small {
    color: #94a3b8;
}
</style>
</head>

<body>

<header>🚗 SpritApp</header>

<div class="container">

    <div class="card">
        <div class="small">Neue Fahrt</div>

        <input type="number" id="km" placeholder="Gefahrene km">
        <input type="number" id="liter" placeholder="Getankte Liter">
        <input type="number" id="preis" placeholder="Preis €/L">

        <button onclick="speichern()">Speichern</button>
    </div>

    <div class="card">
        <div class="small">Durchschnitt</div>
        <div id="avg" class="stat">0.0</div>
        <div class="small">L / 100 km</div>
    </div>

    <div class="card">
        <div class="small">Verlauf</div>
        <canvas id="chart"></canvas>
    </div>

</div>

<script>
let fahrten = JSON.parse(localStorage.getItem("fahrten")) || [];
let chart;

anzeigen();

function speichern() {
    let km = parseFloat(document.getElementById("km").value);
    let liter = parseFloat(document.getElementById("liter").value);
    let preis = parseFloat(document.getElementById("preis").value);

    if (!km || !liter || !preis) {
        alert("Bitte alle Felder ausfüllen!");
        return;
    }

    let verbrauch = (liter / km) * 100;

    fahrten.push({ verbrauch });
    localStorage.setItem("fahrten", JSON.stringify(fahrten));

    anzeigen();
}

function anzeigen() {
    let labels = fahrten.map((_, i) => i + 1);
    let daten = fahrten.map(f => f.verbrauch);

    if (chart) chart.destroy();

    let ctx = document.getElementById("chart");

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                data: daten,
                borderWidth: 3,
                tension: 0.4
            }]
        },
        options: {
            plugins: { legend: { display: false } }
        }
    });

    if (fahrten.length > 0) {
        let avg = daten.reduce((a,b)=>a+b)/daten.length;
        document.getElementById("avg").innerText = avg.toFixed(1);
    }
}

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
